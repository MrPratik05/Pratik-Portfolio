<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin | Pratik Portfolio</title><link rel="stylesheet" href="styles.css"><style>.admin{width:min(980px,calc(100% - 32px));margin:110px auto;padding-bottom:70px}.admin-panel{display:none}.admin input,.admin textarea{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:white;margin:8px 0 16px;font:inherit}.admin textarea{min-height:120px}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.admin-list{display:grid;gap:12px}.admin-item{padding:16px;border:1px solid var(--border);border-radius:18px;background:rgba(255,255,255,.05)}.danger{background:#33111a!important}.small-btn{padding:9px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.07);color:white;cursor:pointer}@media(max-width:760px){.admin-grid{grid-template-columns:1fr}}</style></head><body><div class="admin"><a class="btn secondary" href="index.html">← Public Portfolio</a><h1>Portfolio Admin</h1><p class="hero-copy">This local admin saves updates in your browser. For a public production site, keep admin.html private or remove it from GitHub.</p><div id="login" class="glass-card"><h2>Login</h2><input id="password" type="password" placeholder="Password"><button class="btn primary" onclick="login()">Login</button><p id="loginMsg"></p></div><div id="panel" class="admin-panel"><div class="glass-card"><h2>Profile Photo</h2><input type="file" id="photoInput" accept="image/*"><button class="btn primary" onclick="savePhoto()">Save Photo</button><button class="btn secondary" onclick="removePhoto()">Remove Photo</button></div><div class="admin-grid"><div class="glass-card"><h2>Add Project</h2><input id="pTitle" placeholder="Project title"><input id="pCategory" placeholder="Category"><textarea id="pDesc" placeholder="Description"></textarea><input id="pTech" placeholder="Tech stack, comma separated"><input id="pGit" placeholder="GitHub link"><input id="pDemo" placeholder="Live demo link"><button class="btn primary" onclick="addProject()">Add Project</button></div><div class="glass-card"><h2>Add Skill</h2><input id="sName" placeholder="Skill name"><input id="sLevel" type="number" placeholder="Level 1-100"><button class="btn primary" onclick="addSkill()">Add Skill</button></div></div><div class="glass-card"><h2>Current Projects</h2><div class="admin-list" id="projectAdminList"></div></div><div class="glass-card"><h2>Current Skills</h2><div class="admin-list" id="skillAdminList"></div></div><button class="btn secondary danger" onclick="resetAll()">Reset All Local Edits</button></div></div><script src="data.js"></script><script>let local=JSON.parse(localStorage.getItem('pratikPortfolioCMS')||'{}');let data={...portfolioData,...local};function persist(){localStorage.setItem('pratikPortfolioCMS',JSON.stringify(data));renderAdmin()}function login(){if(document.getElementById('password').value==='Pratik@2026'){document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block';renderAdmin()}else document.getElementById('loginMsg').textContent='Wrong password'}function savePhoto(){const f=document.getElementById('photoInput').files[0];if(!f)return;const r=new FileReader();r.onload=()=>{data.profilePhoto=r.result;persist()};r.readAsDataURL(f)}function removePhoto(){delete data.profilePhoto;persist()}function addProject(){data.projects.unshift({title:pTitle.value,category:pCategory.value,desc:pDesc.value,tech:pTech.value.split(',').map(x=>x.trim()).filter(Boolean),github:pGit.value||'#',demo:pDemo.value||'#'});persist()}function addSkill(){data.skills.push([sName.value,Number(sLevel.value)||80]);persist()}function delProject(i){data.projects.splice(i,1);persist()}function delSkill(i){data.skills.splice(i,1);persist()}function resetAll(){localStorage.removeItem('pratikPortfolioCMS');location.reload()}function renderAdmin(){projectAdminList.innerHTML=data.projects.map((p,i)=>`<div class='admin-item'><strong>${p.title}</strong><p>${p.category}</p><button class='small-btn' onclick='delProject(${i})'>Delete</button></div>`).join('');skillAdminList.innerHTML=data.skills.map((s,i)=>`<div class='admin-item'><strong>${s[0]}</strong> — ${s[1]}% <button class='small-btn' onclick='delSkill(${i})'>Delete</button></div>`).join('')}</script></body></html>
